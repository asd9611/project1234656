<div class="container">
    <div class="logo-area">CS-CUT</div>
    <h1>모의고사 등급컷 조회</h1>
    <p class="subtitle">연도와 시험을 선택하여 확인해보세요.</p>
    
    <div style="text-align: left; margin-bottom: 25px;">
        <label class="input-group-label">시험 선택</label>
        <div class="select-area">
            <select id="yearSelect">
                <option value="2025" selected>2025년</option>
                <option value="2024">2024년</option>
                <option value="2023">2023년</option>
                <option value="2022">2022년</option>
                <option value="2021">2021년</option>
                <option value="2020">2020년</option>
            </select>
            <select id="examSelect">
                <option value="6월">6월 모평</option>
                <option value="9월">9월 모평</option>
                <option value="수능">11월(수능)</option>
            </select>
        </div>
    </div>
    <button onclick="searchGrade()">등급컷 조회하기</button>

    <div id="resultArea" style="margin-top: 30px; display: none;">
        <table style="width:100%; border-collapse: collapse; font-size: 0.9rem;">
            <thead>
                <tr style="border-bottom: 2px solid var(--primary);">
                    <th style="padding: 10px;">과목</th>
                    <th>1컷</th><th>2컷</th><th>3컷</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<script>
    async function searchGrade() {
        const year = document.getElementById('yearSelect').value;
        const exam = document.getElementById('examSelect').value;
        
        try {
            const response = await fetch(`/api/grade-cuts?year=${year}&exam_type=${exam}`);
            const data = await response.json();
            
            const resultArea = document.getElementById('resultArea');
            const resultBody = document.getElementById('resultBody');
            resultBody.innerHTML = '';

            if (data.length === 0) {
                alert("해당 데이터가 없습니다.");
                resultArea.style.display = 'none';
                return;
            }

            data.forEach(item => {
                const row = `<tr>
                    <td style="padding: 10px; border-bottom: 1px solid var(--border);">${item.subject}</td>
                    <td style="border-bottom: 1px solid var(--border);">${item.grade_1}</td>
                    <td style="border-bottom: 1px solid var(--border);">${item.grade_2}</td>
                    <td style="border-bottom: 1px solid var(--border);">${item.grade_3}</td>
                </tr>`;
                resultBody.innerHTML += row;
            });
            resultArea.style.display = 'block';
        } catch (e) {
            alert("서버와 통신 중 오류가 발생했습니다.");
        }
    }
</script>
